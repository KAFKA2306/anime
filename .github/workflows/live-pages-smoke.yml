name: Verify live GitHub Pages

on:
  pull_request:
    paths:
      - .github/workflows/live-pages-smoke.yml
  push:
    branches:
      - main
    paths:
      - index.html
      - styles.css
      - app.js
      - data/**
      - .github/workflows/pages.yml
      - .github/workflows/live-pages-smoke.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect GitHub Pages source configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{html_url, status, build_type, source, public}'

      - name: Verify production HTML and assets
        shell: bash
        run: |
          set -euo pipefail
          base="https://kafka2306.github.io/anime"
          tmp="$(mktemp -d)"

          matched=false
          for attempt in $(seq 1 36); do
            curl --fail --silent --show-error --location \
              "$base/?smoke=${GITHUB_SHA}-${attempt}" -o "$tmp/index.html"
            if grep -Fq '2026-07-23-pastel-watercolor-2' "$tmp/index.html"; then
              matched=true
              break
            fi
            echo "Live site has not propagated yet (attempt ${attempt})."
            sleep 10
          done
          test "$matched" = true

          grep -F 'id="yearSelect"' "$tmp/index.html"
          grep -F 'id="searchInput"' "$tmp/index.html"
          grep -F 'id="workGrid"' "$tmp/index.html"

          curl --fail --silent --show-error --location \
            "$base/styles.css?smoke=${GITHUB_SHA}" -o "$tmp/styles.css"
          grep -F -- '--lavender:' "$tmp/styles.css"
          grep -F -- '--rose:' "$tmp/styles.css"
          grep -F -- '--mint:' "$tmp/styles.css"

          curl --fail --silent --show-error --location \
            "$base/data/manifest.json?smoke=${GITHUB_SHA}" -o "$tmp/manifest.json"
          python -m json.tool "$tmp/manifest.json" >/dev/null

          echo "Live Pages smoke test passed: $base/"
