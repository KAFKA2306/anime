name: Verify live GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - styles.css
      - app.js
      - tag-ranking.css
      - tag-ranking.js
      - data/**
      - .github/workflows/pages.yml
      - .github/workflows/live-pages-smoke.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect GitHub Pages source configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{html_url, status, build_type, source, public}'

      - name: Verify production HTML and assets
        shell: bash
        run: |
          set -euo pipefail
          base="https://kafka2306.github.io/anime"
          tmp="$(mktemp -d)"

          matched=false
          for attempt in $(seq 1 36); do
            curl --fail --silent --show-error --location \
              "$base/?year=2024&tag=SF%E3%83%BB%E3%83%95%E3%82%A1%E3%83%B3%E3%82%BF%E3%82%B8%E3%83%BC&smoke=${GITHUB_SHA}-${attempt}" -o "$tmp/index.html"
            if grep -Fq '2026-07-24-tag-ranking-1' "$tmp/index.html"; then
              matched=true
              break
            fi
            echo "Live site has not propagated yet (attempt ${attempt})."
            sleep 10
          done
          test "$matched" = true

          grep -F 'id="yearSelect"' "$tmp/index.html"
          grep -F 'id="searchInput"' "$tmp/index.html"
          grep -F 'id="workGrid"' "$tmp/index.html"
          grep -F 'id="activeFilterBar"' "$tmp/index.html"
          grep -F 'id="mobileStatusText"' "$tmp/index.html"
          grep -F 'tag-ranking.css' "$tmp/index.html"
          grep -F 'tag-ranking.js' "$tmp/index.html"

          curl --fail --silent --show-error --location \
            "$base/styles.css?smoke=${GITHUB_SHA}" -o "$tmp/styles.css"
          grep -F -- '--lavender:' "$tmp/styles.css"
          grep -F -- '--rose:' "$tmp/styles.css"
          grep -F -- '--mint:' "$tmp/styles.css"

          curl --fail --silent --show-error --location \
            "$base/tag-ranking.css?smoke=${GITHUB_SHA}" -o "$tmp/tag-ranking.css"
          grep -F 'content-visibility:auto' "$tmp/tag-ranking.css"
          grep -F '.responsive-control' "$tmp/tag-ranking.css"
          grep -F '.mobile-status' "$tmp/tag-ranking.css"

          curl --fail --silent --show-error --location \
            "$base/app.js?smoke=${GITHUB_SHA}" -o "$tmp/app.js"
          node --check "$tmp/app.js"

          curl --fail --silent --show-error --location \
            "$base/tag-ranking.js?smoke=${GITHUB_SHA}" -o "$tmp/tag-ranking.js"
          node --check "$tmp/tag-ranking.js"
          grep -F 'normalize(tag) === normalize(activeTag)' "$tmp/tag-ranking.js"
          grep -F 'タグ内 #' "$tmp/tag-ranking.js"
          grep -F "url.searchParams.set('tag'" "$tmp/tag-ranking.js"

          curl --fail --silent --show-error --location \
            "$base/data/manifest.json?smoke=${GITHUB_SHA}" -o "$tmp/manifest.json"
          python -m json.tool "$tmp/manifest.json" >/dev/null

          echo "Live Pages smoke test passed: $base/?year=2024&tag=SF・ファンタジー"

      - name: Record verified deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          deployment_message="$(gh api "repos/${GITHUB_REPOSITORY}/commits/gh-pages" --jq '.commit.message')"
          deployed_source_commit="${deployment_message#Deploy }"
          verified_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          marker="$(mktemp)"
          cat > "$marker" <<JSON
          {
            "status": "passed",
            "site": "https://kafka2306.github.io/anime/?year=2024",
            "tag_example": "SF・ファンタジー",
            "build": "2026-07-24-tag-ranking-1",
            "deployed_source_commit": "${deployed_source_commit}",
            "verification_workflow_commit": "${GITHUB_SHA}",
            "verified_at": "${verified_at}",
            "workflow_run": "${run_url}",
            "checks": [
              "production HTML build marker",
              "year/search/grid/filter/mobile controls",
              "base and tag-ranking CSS",
              "app.js and tag-ranking.js syntax and feature markers",
              "data/manifest.json parse"
            ]
          }
          JSON
          encoded="$(base64 -w 0 "$marker")"
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/verification/live-pages.json?ref=main" --jq '.sha' 2>/dev/null || true)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/verification/live-pages.json" -f message="Record live Pages verification for ${deployed_source_commit}" -f content="$encoded" -f branch=main)
          if [[ -n "$current_sha" ]]; then
            args+=(-f sha="$current_sha")
          fi
          gh api "${args[@]}" --jq '{commit: .commit.html_url, content: .content.html_url}'
